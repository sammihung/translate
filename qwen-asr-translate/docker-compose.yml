services:
  # ==========================================
  # Ollama Translation Service
  # ==========================================
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_server
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================
  # App Gateway (UI + API Router)
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: qwen_asr_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://ollama:11434
      - CPU_WORKER_URL=http://cpu-worker:8001
      - GPU_WORKER_URL=http://gpu-worker:8001
      - DEFAULT_DEVICE=cpu
    volumes:
      - ./config.ini:/app/config.ini:ro
      - ./logs:/app/logs
      - app_config:/app/.config
    depends_on:
      ollama:
        condition: service_healthy
      cpu-worker:
        condition: service_healthy
      gpu-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ==========================================
  # CPU Worker (ASR Inference on CPU)
  # ==========================================
  cpu-worker:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    container_name: qwen_asr_cpu_worker
    restart: unless-stopped
    expose:
      - "8001"
    environment:
      - PYTHONUNBUFFERED=1
      - CUDA_VISIBLE_DEVICES=
      - WORKER_DEVICE=cpu
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./logs:/app/logs
      - cpu_models:/app/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================
  # GPU Worker (ASR Inference with CUDA)
  # ==========================================
  gpu-worker:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: qwen_asr_gpu_worker
    restart: unless-stopped
    expose:
      - "8001"
    environment:
      - PYTHONUNBUFFERED=1
      - CUDA_VISIBLE_DEVICES=0
      - WORKER_DEVICE=cuda
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./logs:/app/logs
      - gpu_models:/app/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  ollama_data:
    driver: local
  app_config:
    driver: local
  cpu_models:
    driver: local
  gpu_models:
    driver: local

networks:
  default:
    name: qwen_asr_network
    driver: bridge
