# QwenASR 設定檔
# 修改此檔案以調整模型和效能設定

[ASR]
# ASR 模型選擇：Qwen/Qwen3-ASR-0.6B 或 Qwen/Qwen3-ASR-1.7B
# 0.6B: 較快，適合 CPU
# 1.7B: 較準確，適合 GPU 或強大 CPU
model_name = Qwen/Qwen3-ASR-0.6B

# 推理裝置：cpu 或 cuda
device = cpu

# 語言設定：auto, zh, en, ja, ko, fr, de, es
language = auto

[VAD]
# 語音閾值：0.0-1.0，越低越敏感
# 建議：0.3-0.4（捕捉小聲說話），0.5-0.6（安靜環境）
threshold = 0.35

# 最小語音長度（秒）：短於此長度的聲音會被忽略
# 建議：0.2-0.3（捕捉短語），0.5（避免雜音）
min_speech_duration = 0.2

# 最小靜音長度（秒）：長於此長度才判定為語音結束
# 建議：1.0-1.5（慢速說話或有停頓），0.5（快速對話）
min_silence_duration = 1.2

[TRANSLATION]
# 來源語言：zh, en, ja, ko, auto
source_lang = auto

# 目標語言：zh, en, ja, ko, fr, de, es
target_lang = en

[SPEAKER_DIARIZATION]
# 是否啟用說話者分離
enabled = true

# HuggingFace Token（必需，用於下載 pyannote 模型）
# 取得：https://huggingface.co/settings/tokens
# 設定環境變數 HF_TOKEN 或在此填寫
hf_token = 

# 說話者數量範圍
min_speakers = 1
max_speakers = 4

[AUDIO]
# 取樣率（Hz）
sample_rate = 16000

# 緩衝區大小（秒）
buffer_duration = 2.0

# 重疊緩衝區大小（秒）- 用於避免切斷字詞
overlap_duration = 2.0

[DISPLAY]
# 是否顯示雙語字幕
dual_language = true

# 是否顯示時間戳
show_timestamp = true

# 是否顯示說話者標籤
show_speaker = true
