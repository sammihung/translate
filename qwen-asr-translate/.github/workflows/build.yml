name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install uv
      run: |
        python -m pip install --upgrade pip
        pip install uv
    
    - name: Install dependencies
      run: |
        uv sync
        pip install pyinstaller==6.5.0
    
    - name: Freeze dependencies
      run: |
        uv pip compile pyproject.toml --output-file requirements-freeze.txt
    
    - name: Build executable
      run: |
        pyinstaller --clean qwen_asr.spec
    
    - name: Create distribution package
      run: |
        Compress-Archive -Path "dist\QwenASR Translate\*" -DestinationPath "QwenASR-Translate-${{ github.ref_name }}.zip"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: QwenASR-Translate-${{ github.ref_name }}
        path: QwenASR-Translate-${{ github.ref_name }}.zip
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: QwenASR-Translate-${{ github.ref_name }}.zip
        body: |
          ## QwenASR Translate ${{ github.ref_name }}
          
          ### Features
          - Real-time ASR with Qwen3-ASR
          - Real-time Translation with Ollama Gemma-4B
          - Floating Subtitle Mode
          - Font Size Adjustment
          - Auto GPU/CPU Detection
          - 3 Performance Tiers
          
          ### Installation
          1. Download and extract the zip file
          2. Run `QwenASR Translate.exe`
          3. Install Ollama separately: https://ollama.ai
          
          ### System Requirements
          - Windows 10/11 (64-bit)
          - 8GB RAM (FAST mode) / 16GB+ (BALANCED/FULL)
          - NVIDIA GPU (optional, for better performance)
          
          ### Known Issues
          - First launch may be slow (model downloading)
          - CPU mode is slower but fully functional
